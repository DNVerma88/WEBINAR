worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Temp paths writable by non-root user (required for nginx-unprivileged)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version (OWASP A05 - Security Misconfiguration)
    server_tokens off;

    sendfile on;
    keepalive_timeout 65;

    # Allow large resume batch uploads (match backend 100 MB limit)
    client_max_body_size 100m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Redirect HTTP to HTTPS in production
        # location / { return 301 https://$host$request_uri; }

        # ─── OWASP Security Headers (A02, A03, A05) ─────────────────────────
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header X-Frame-Options           "DENY"                                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header X-XSS-Protection          "0"                                   always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        # F12: HSTS removed — only meaningful over HTTPS; this server listens on HTTP (port 80)

        # Content-Security-Policy — strict for production SPA
        # F10: added https: to img-src to allow external cover images / avatars served over HTTPS
        # Added fonts.googleapis.com to style-src and fonts.gstatic.com to font-src for MUI/Roboto fonts
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' wss:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; upgrade-insecure-requests;"
            always;

        # No caching of HTML (so the app always gets the latest index.html)
        add_header Cache-Control "no-store" always;
        add_header Pragma        "no-cache" always;

        # ─── Static Assets ───────────────────────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            # Override no-store for versioned static assets (they have content hashes)
            add_header Cache-Control "public, max-age=31536000, immutable";
            # F11: re-add ALL security headers — add_header is not inherited in nested location blocks
            add_header X-Content-Type-Options    "nosniff"                                    always;
            add_header X-Frame-Options           "DENY"                                       always;
            add_header Referrer-Policy           "strict-origin-when-cross-origin"            always;
            add_header X-XSS-Protection          "0"                                          always;
            add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
            add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' wss:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; upgrade-insecure-requests;" always;
        }

        # ─── API Proxy ───────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ─── SignalR WebSocket Proxy ─────────────────────────────────────────
        location /hubs/ {
            proxy_pass         http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ─── SPA fallback ────────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
